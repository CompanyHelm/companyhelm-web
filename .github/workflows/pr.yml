name: Pull Request CI

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: pr-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Test and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build frontend
        run: npm run build

  detect-docker-changes:
    name: Detect Docker Changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      docker_changed: ${{ steps.filter.outputs.docker }}

    steps:
      - name: Detect Docker packaging changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            docker:
              - 'Dockerfile'
              - '.dockerignore'

  docker-build:
    name: Docker Build
    needs: detect-docker-changes
    if: needs.detect-docker-changes.outputs.docker_changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build .
