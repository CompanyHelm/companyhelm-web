name: Promote Frontend Release To Prod

on:
  push:
    tags:
      - "v*"

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::320042237800:role/GitHubActionsFrontendDeployRole
          role-session-name: github-actions-frontend-prod
          aws-region: us-west-2

      - name: Resolve promoted image tag
        env:
          SHA: ${{ github.sha }}
        run: |
          SHORT_SHA="$(echo "$SHA" | cut -c1-7)"
          echo "IMAGE_TAG=main-$SHORT_SHA" >> "$GITHUB_ENV"
          echo "IMAGE_URI=320042237800.dkr.ecr.us-west-2.amazonaws.com/companyhelm-web:main-$SHORT_SHA" >> "$GITHUB_ENV"

      - name: Verify tag points at main
        env:
          SHA: ${{ github.sha }}
        run: |
          git fetch origin main --depth=1
          git merge-base --is-ancestor "$SHA" origin/main

      - name: Verify image exists
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          aws ecr describe-images --repository-name companyhelm-web --image-ids imageTag="$IMAGE_TAG" > /dev/null

      - name: Deploy prod service
        env:
          CLUSTER_NAME: default
          CONTAINER_NAME: Main
          IMAGE_URI: ${{ env.IMAGE_URI }}
          SERVICE_NAME: companyhelm-web
        run: |
          CURRENT_TASK_DEF_ARN="$(aws ecs describe-services --cluster "$CLUSTER_NAME" --services "$SERVICE_NAME" --query 'services[0].taskDefinition' --output text)"
          aws ecs describe-task-definition --task-definition "$CURRENT_TASK_DEF_ARN" --query 'taskDefinition' > task-def.json
          jq --arg IMAGE "$IMAGE_URI" --arg CONTAINER_NAME "$CONTAINER_NAME" '
            .containerDefinitions = (
              .containerDefinitions
              | map(if .name == $CONTAINER_NAME then .image = $IMAGE else . end)
            )
            | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)
          ' task-def.json > task-def-rendered.json
          NEW_TASK_DEF_ARN="$(aws ecs register-task-definition --cli-input-json file://task-def-rendered.json --query 'taskDefinition.taskDefinitionArn' --output text)"
          aws ecs update-service --cluster "$CLUSTER_NAME" --service "$SERVICE_NAME" --task-definition "$NEW_TASK_DEF_ARN" > /dev/null
          aws ecs wait services-stable --cluster "$CLUSTER_NAME" --services "$SERVICE_NAME"

      - name: Tag image digest with release tag
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          MANIFEST="$(aws ecr batch-get-image --repository-name companyhelm-web --image-ids imageTag="$IMAGE_TAG" --query 'images[0].imageManifest' --output text)"
          aws ecr put-image --repository-name companyhelm-web --image-tag "$RELEASE_TAG" --image-manifest "$MANIFEST" > /dev/null
