name: Build And Push Frontend Image

on:
  push:
    branches: ["main"]
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR Public
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Resolve ECR Public repository URI
        id: repository
        run: |
          REPOSITORY_URI="$(aws ecr-public describe-repositories \
            --region us-east-1 \
            --repository-names companyhelm-web \
            --query 'repositories[0].repositoryUri' \
            --output text)"

          if [ -z "$REPOSITORY_URI" ] || [ "$REPOSITORY_URI" = "None" ]; then
            echo "companyhelm-web public ECR repository was not found" >&2
            exit 1
          fi

          echo "repository_uri=$REPOSITORY_URI" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        env:
          ECR_REPOSITORY: ${{ steps.repository.outputs.repository_uri }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          SHORT_SHA="$(echo "$GITHUB_SHA" | cut -c1-7)"
          IMAGE_TAGS=()

          if [ "$GITHUB_REF" = "refs/heads/main" ]; then
            IMAGE_TAGS+=("$ECR_REPOSITORY:main-$SHORT_SHA")
            IMAGE_TAGS+=("$ECR_REPOSITORY:latest")

            while IFS= read -r release_tag; do
              [ -n "$release_tag" ] || continue
              IMAGE_TAGS+=("$ECR_REPOSITORY:${release_tag#v}")
            done < <(git tag --points-at "$GITHUB_SHA" | grep '^v' || true)
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            git fetch origin main --depth=1
            git merge-base --is-ancestor "$GITHUB_SHA" origin/main
            IMAGE_TAGS+=("$ECR_REPOSITORY:${GITHUB_REF_NAME#v}")
          else
            echo "Unsupported ref: $GITHUB_REF" >&2
            exit 1
          fi

          TAG_ARGS=()
          echo "Publishing image tags:"
          for image_tag in "${IMAGE_TAGS[@]}"; do
            echo "  $image_tag"
            TAG_ARGS+=(-t "$image_tag")
          done

          docker buildx build \
            --platform linux/amd64 \
            "${TAG_ARGS[@]}" \
            --push \
            .

      - name: Update dev image pin in infra repo
        if: github.ref == 'refs/heads/main'
        env:
          INFRA_TOKEN: ${{ secrets.COMPANYHELM_INFRA_SYNC_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "$INFRA_TOKEN" ]; then
            echo "Missing COMPANYHELM_INFRA_SYNC_TOKEN secret for infra sync" >&2
            exit 1
          fi

          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE_URI="${{ steps.repository.outputs.repository_uri }}:main-$SHORT_SHA"
          COMMIT_MESSAGE="chore: deploy dev frontend image main-$SHORT_SHA"
          INFRA_DIR="$RUNNER_TEMP/companyhelm-infra"

          git clone "https://x-access-token:${INFRA_TOKEN}@github.com/CompanyHelm/companyhelm-infra.git" "$INFRA_DIR"
          cd "$INFRA_DIR"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for attempt in 1 2 3; do
            git fetch origin main
            git checkout -B main origin/main
            node scripts/set-docker-image.mjs --environment dev --service frontend --image "$IMAGE_URI"

            if git diff --quiet -- envs/dev/dev.auto.tfvars; then
              exit 0
            fi

            git add envs/dev/dev.auto.tfvars
            git commit -m "$COMMIT_MESSAGE"

            if git push origin HEAD:main; then
              exit 0
            fi

            git reset --hard origin/main
          done

          echo "Unable to push frontend image update to companyhelm-infra after 3 attempts" >&2
          exit 1
