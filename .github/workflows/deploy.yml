name: Build And Push Frontend Image

on:
  push:
    branches: ["main"]
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR Public
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Resolve ECR Public repository URI
        id: repository
        run: |
          REPOSITORY_URI="$(aws ecr-public describe-repositories \
            --region us-east-1 \
            --repository-names companyhelm-web \
            --query 'repositories[0].repositoryUri' \
            --output text)"

          if [ -z "$REPOSITORY_URI" ] || [ "$REPOSITORY_URI" = "None" ]; then
            echo "companyhelm-web public ECR repository was not found" >&2
            exit 1
          fi

          echo "repository_uri=$REPOSITORY_URI" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        env:
          ECR_REPOSITORY: ${{ steps.repository.outputs.repository_uri }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          SHORT_SHA="$(echo "$GITHUB_SHA" | cut -c1-7)"
          IMAGE_TAGS=()

          if [ "$GITHUB_REF" = "refs/heads/main" ]; then
            IMAGE_TAGS+=("$ECR_REPOSITORY:main-$SHORT_SHA")
            IMAGE_TAGS+=("$ECR_REPOSITORY:latest")

            while IFS= read -r release_tag; do
              [ -n "$release_tag" ] || continue
              IMAGE_TAGS+=("$ECR_REPOSITORY:${release_tag#v}")
            done < <(git tag --points-at "$GITHUB_SHA" | grep '^v' || true)
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            git fetch origin main --depth=1
            git merge-base --is-ancestor "$GITHUB_SHA" origin/main
            IMAGE_TAGS+=("$ECR_REPOSITORY:${GITHUB_REF_NAME#v}")
          else
            echo "Unsupported ref: $GITHUB_REF" >&2
            exit 1
          fi

          TAG_ARGS=()
          echo "Publishing image tags:"
          for image_tag in "${IMAGE_TAGS[@]}"; do
            echo "  $image_tag"
            TAG_ARGS+=(-t "$image_tag")
          done

          docker buildx build \
            --platform linux/amd64 \
            "${TAG_ARGS[@]}" \
            --push \
            .
