name: Build & Push to ECR

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::320042237800:role/GitHubActionsFrontendECRPushRole
          role-session-name: github-actions-frontend-ecr
          aws-region: us-west-2

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        env:
          ECR_REGISTRY: 320042237800.dkr.ecr.us-west-2.amazonaws.com
          ECR_REPOSITORY: companyhelm-web
          SHA: ${{ github.sha }}
        run: |
          DATE=$(date +%Y-%m-%d)
          SHORT_SHA=$(echo "$SHA" | cut -c1-7)
          TAG_DATE_SHA="$DATE-$SHORT_SHA"

          docker buildx build \
            --platform linux/amd64 \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:$TAG_DATE_SHA" \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:latest" \
            --push \
            .
